section_collab_label: — 04
section_collab_title: Collaborations
section_collab_subtitle: "Artists, artisans and commissions that have shaped the journey."

collab_text: "Over the years, Terra i Foc has collaborated with artists, designers and artisans from various fields. Each collaboration has been an exchange — a way to learn and create pieces that could not arise from a single perspective."

