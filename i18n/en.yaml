section_collab_title: Collaborations
section_collab_subtitle: "Artists, artisans and commissions that have shaped the journey."

collab_text: "Terra i Foc collaborated with various ceramists, sculptors, painters and artisans. It also had a network of representatives who brought the pieces throughout Spain and the Balearic Islands."

collab_dedicacio_text: "We dedicate this book to all those who have collaborated in making this collection of the work done at the workshop over more than forty years.\n\nTo our children and grandchildren, so they may remember the part they lived.\n\nTo Dolors Albós for proofreading the text and to Dolors Bosch for helping make the writing understandable for people unfamiliar with the craft.\n\nAlso to record how parents and grandparents worked the craft differently, and to thank them for their shared experience.\n\nEl Pago, August 2022"
