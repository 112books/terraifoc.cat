hero_brand: Terra i Foc
hero_tagline: Artisan Ceramics Workshop
hero_desc: "Founded by Joan Martínez Peidro in 1969. Handmade artisan ceramics in Penedès, with the help of his wife Isabel Serres and collaborating artists."
hero_cita: "Craftsmanship is the human capacity to produce objects by hand or with the help of simple tools or machines. Artisans can also produce serial works, but they differ from industrial production in that each piece is made by hand, one by one, and this makes every object unique."

