collab_casadevall_title: Joaquim Casadevall i Vergés
collab_casadevall_text: "4. Joaquim Casadevall i Vergés (1895–1974)\n\nJoaquim Casadevall was born in Olot, very close to Joaquim Vayreda. His parents were the Vayreda family's tenant farmers, and as a child he was tasked with cleaning the painter's brushes. This is how he learned the craft. He was more interested in sculpture and practised it in Barcelona. He lived in the Sagrada Família neighbourhood and had a small workshop near the Dam factory. He would fire his clay pieces at the workshop of Joan's parents. Joan remembers they carried the pieces in a bundle tied in a handkerchief, stacked in three or four layers. They went by bus, sometimes with his wife who helped him.\n\nWe know he sold his work at the Montfalcon shops in Barcelona and also at the Hotel Colón. His best-known works are Saint George on Horseback and the Last Supper. He probably died in the mid-20th century. Despite being a good sculptor, after his father's workshop closed no further references were found.\n\nWe wish to pay tribute to him here, because we consider him a great sculptor."
collab_manosa_title: Salvador Mañosa
collab_manosa_text: "3. Salvador Mañosa Jané (1945–2022)\n\nOriginally from Cerdanyola del Vallès but deeply rooted in Barberà del Vallès, Salvador Mañosa began as an apprentice at age 15 in the workshop of Francesc Juventeny, combining this traditional workshop training with studies at the Escola Massana in Barcelona. There he had Eudald Serra as a teacher, a prominent figure of Catalan modernity from the 1930s to the 1960s.\n\nMañosa's technique shows a knowledge of the traditional craft, with clay and later bronze as characteristic materials of his work, coexisting with more modern techniques without losing the artisanal essence characteristic of the sculptor.\n\nHis female nudes stand out, with a careful technique that seems to have endowed them with movement. Mañosa has also dedicated much of his work to large-scale public sculpture in many cities across Catalonia and Spain, as well as in Brazil, Russia, France, Japan, Germany, and the United States.\n\nSalvador Mañosa died on 15 November 2022 at the age of 77. He dedicated part of his time to teaching specific subjects of his profession, sharing his knowledge and experience in the art of sculpture, stating that \"it is a great satisfaction and the best reward to see how some of my students are now exhibiting around the world.\"\n\nMore information: <a href=\"https://www.cerdanyola.cat/actualitat/salvador-manosa-lescultor-de-cerdanyola\" target=\"_blank\" rel=\"noopener\">Salvador Mañosa, l'escultor de Cerdanyola</a>"
collab_benet_title: Benet Ferrer Bolunya
collab_benet_text: "2. Benet Ferrer Bolunya (Sabadell, 25 April 1945)\n\nA Catalan artist. He studied at the Escola Industrial d'Arts i Oficis in Sabadell (1962–1966) and at the Escola Massana (1966), and soon became interested in ceramics as a sculptural medium. Connected from a young age to the avant-garde, the most important part of his work — the exact representation of everyday objects — is hyperrealist in orientation. He has also carried out happenings and various collective actions with public participation. In 1969 he began teaching at the Escola Massana.\n\nIn 1976 he presented an exhibition of terracotta sculptures at Galeria G. At Espai 10 of the Fundació Joan Miró in 1980 he introduced an unfired clay structure that extended out of the room, as if crossing the glass wall, spreading outward into the olive tree courtyard. According to Daniel Giralt-Miracle, this exhibition was a key moment in the artist's career.\n\nIn 1977 he created the ceramic mural on the Ebro motorway at Fraga. He has extensive experience in ceramics; from the 1970s he experimented with meta-objects that played with reality through visual and tactile fiction, later moving to works linked to conceptual art and marquetry objects.\n\nIn 1985 he received a grant from the Department of Plastic Arts of the Government of Catalonia for furniture pieces. In 1987 he became a member of the Académie Internationale de la Céramique in Geneva. In 1988 he created the Campoamor sculpture in Sabadell.\n\nMore information: <a href=\"https://ca.wikipedia.org/wiki/Benet_Ferrer_Bolunya\" target=\"_blank\" rel=\"noopener\">Benet Ferrer Bolunya — Wikipedia</a>"
collab_maties_title: Maties Palau Ferré
collab_maties_text: "9 — Collaborating artists of the workshop\n\n1. Maties Palau Ferré\n\nThe life of painter, sculptor and ceramist Maties Palau Ferré (1921–2000) is a love story for art distorted by the baseness and miseries of greed and bad faith. With the added disadvantage that the unwanted and not purely artistic notoriety he acquired between the early 1970s and mid-1980s has harmed his posterity. At least it has made him less well-known than he seems to deserve given the success he enjoyed in life. With The Painter Who Burned His Paintings. Biographical Essay of Maties Palau Ferré, historian Francesc Marco-Palau (Tarragona, 1989), a grand-nephew of the artist, seeks to help recover his figure and work.\n\nKnown to some as «the second Picasso» —an enormous compliment that the artist, reasonably, did not appreciate: «I am the first Palau Ferré», he would reply—, Maties Palau Ferré was born in Montblanc in 1921 into a family of merchants and espadrille makers. They also owned land and had certain cultural interests. Palau Ferré was clear about his artistic vocation very early on and, after the civil war —he narrowly avoided being mobilised with the quinta del biberón—, he won a position at the Institut de Previsió that allowed him to settle in Barcelona. The job was only an excuse: if he had gone to Barcelona, it was to train as an artist and make a place for himself in the art world. He enrolled at the Escola de Belles Arts Sant Jordi and gradually made a place for himself within the Barcelona art circuit.\n\nMore information: <a href=\"https://es.wikipedia.org/wiki/Mat%C3%ADas_Palau_Ferr%C3%A9\" target=\"_blank\" rel=\"noopener\">Matías Palau Ferré — Wikipedia</a>"
