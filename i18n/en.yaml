section_joan_label: — 01
section_joan_title: Joan
section_joan_subtitle: "A lifetime dedicated to artisan ceramics."
joan_intro: "Joan Martínez Peidro dedicated 41 years of his life to the ceramic craft. From the wood-fired kiln to the electric kiln, he built a workshop that is a reference in Penedès. He retired in 2010, and today his son sporadically continues the craft, keeping the fire of tradition alive."

section_familia_label: — 02
section_familia_title: A family of potters
section_familia_subtitle: "Ceramics as a family legacy."
familia_text: "The ceramic tradition in the Martínez family runs deep. The Terra i Foc workshop has been a meeting point where the knowledge of the craft has been passed down through generations. Each piece that leaves the workshop carries the imprint of a family that has made earth and fire their way of life."

section_taller_label: — 03
section_taller_title: The workshop
section_taller_subtitle: "From the potter's workshop to the ceramist's studio."

taller_evo_title: Evolution
taller_evo_text: "What started as a traditional potter's workshop has evolved into a contemporary ceramist's studio where ancient techniques coexist with new tools. The original wood-fired kiln, manual wheels and new electric kilns share a space that has grown over the years."

taller_estructura_title: Structure
taller_estructura_text: "The workshop has dedicated spaces for each phase of the process: clay storage, kneading and wheel area, drying area, glazing and finally the kiln area. Every corner of the workshop serves a specific purpose, the result of decades of experience."

taller_construccions_title: Constructions
taller_construccions_text: "The workshop constructions have adapted to changing needs. From the primitive wood-fired kiln built with refractory bricks to the modern electrical installations, each expansion tells a chapter of the workshop's story."

taller_dades_title: Data
taller_dades_intro: "Figures that tell the evolution of the workshop."

