section_quisom_label: — 01
section_quisom_title: About us
section_quisom_tagline: "Handcrafted ceramics in the <span>Penedès</span>. A lifetime craft."
quisom_text: "Terra i Foc is an artisan ceramics workshop at Carrer de la Verge de Montserrat, 17, El Pago (Subirats), Barcelona. Founded in 1969 by Joan Martínez Peidro, the workshop has been a reference point for handmade ceramics in Penedès for decades. Each piece is crafted with care, from kneading the clay to the final firing in the kiln. Today, his son sporadically continues the craft, keeping the fire of tradition alive."

section_historia_label: — 02
section_historia_title: History
section_historia_tagline: "In 1969 we lit the kiln for the first time. The rest is <span>earth and fire</span>."
historia_intro: "In 1969, Joan Martínez Peidro opened the Terra i Foc ceramics workshop in El Pago. For 41 years he dedicated himself to the ceramic craft, creating unique pieces and working on commission. After his retirement in 2010, his son has kept the essence of the workshop alive, taking on occasional commissions and preserving the legacy of a life dedicated to ceramics."

