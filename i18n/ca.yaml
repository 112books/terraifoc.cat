<li><b>Josep Boada</b> (Vilafranca) — Majorista del 1975 al 2000 per a Terra i Foc, Josep Sanahuja i Manel Serran. Distribuïa a tota la Península i Balears excepte Barcelona.</li>
<li><b>Agustí Monte Montornès</b> — Barcelona, 1995–1997</li>
<li><b>Elia Herranz</b> — Barcelona, 1998–1999</li>
<li><b>Joaquim Rambla</b> — Catalunya, 1995–1996</li>
