section_joan_label: — 01
section_joan_title: El Joan
section_joan_subtitle: "Una vida dedicada a la ceràmica artesanal."
joan_intro: "Joan Martínez Peidro va dedicar 41 anys de la seva vida a l'ofici de ceramista. Del forn de llenya al forn elèctric, va construir un obrador que és referència al Penedès. Es va jubilar el 2010, i avui el seu fill en continua l'ofici de forma esporàdica, mantenint viu el foc de la tradició."

section_familia_label: — 02
section_familia_title: Una família de gerrers
section_familia_subtitle: "La ceràmica com a llegat familiar."
familia_text: "La tradició ceràmica a la família Martínez ve de lluny. L'obrador Terra i Foc ha estat un punt de trobada on el saber de l'ofici s'ha transmès de generació en generació. Cada peça que surt del taller porta l'empremta d'una família que ha fet de la terra i el foc la seva forma de vida."

section_taller_label: — 03
section_taller_title: El taller
section_taller_subtitle: "De l'obrador del gerrer al taller de ceramista."

taller_evo_title: Evolució
taller_evo_text: "El que va començar com un obrador tradicional de gerrer ha evolucionat cap a un taller de ceramista contemporani on conviuen tècniques ancestrals amb noves eines. El forn de llenya original, els torns manuals i els nous forns elèctrics conviuen en un espai que ha anat creixent amb els anys."

taller_estructura_title: Estructura
taller_estructura_text: "El taller compta amb espais diferenciats per a cada fase del procés: emmagatzematge d'argiles, zona d'amassat i torn, zona d'assecatge, esmaltat i, finalment, la zona de forn. Cada racó del taller està pensat per a un propòsit específic, fruit de dècades d'experiència."

taller_construccions_title: Construccions
taller_construccions_text: "Les construccions del taller han anat adaptant-se a les necessitats. Del primitiu forn de llenya construït amb maons refractaris a les modernes instal·lacions elèctriques, cada ampliació explica una etapa de la història de l'obrador."

taller_dades_title: Dades
taller_dades_intro: "Xifres que expliquen l'evolució de l'obrador."

