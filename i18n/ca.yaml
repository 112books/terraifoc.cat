collab_casadevall_title: Joaquim Casadevall i Vergés
collab_casadevall_text: "4. Joaquim Casadevall i Vergés (1895–1974)\n\nJoaquim Casadevall va néixer a Olot, molt a prop de Joaquim Vayreda. Els seus pares eren els masovers dels Vayreda i ell de petit era l'encarregat de netejar els pinzells del pintor. D'aquesta manera va conèixer l'ofici. Li va interessar més l'escultura i la practicava a Barcelona. Vivia al barri de la Sagrada Família i tenia un petit taller a prop de la fàbrica Dam. Anava a coure les seves peces de fang al taller dels pares del Joan. El Joan recorda que anaven a coure les peces dins d'un mocador de fer farcells disposades en tres o quatre pisos. Hi anaven en autobús, de vegades amb la dona que l'ajudava.\n\nSabem que venia les seves obres a les botigues Montfalcon de Barcelona i també a l'hotel Colón. L'obra més coneguda d'ell és el Sant Jordi a cavall i el Sant Sopar. Deuria morir a mitjans del segle XX. Tot i ser un bon escultor, en plegar el taller del pare, no en van trobar cap referència més.\n\nAquí li volem fer homenatge, perquè el considerem un gran escultor."
collab_manosa_title: Salvador Mañosa
collab_manosa_text: "3. Salvador Mañosa Jané (1945–2022)\n\nNatural de Cerdanyola del Vallès, però amb molt d'arrelament a Barberà del Vallès, Salvador Mañosa va entrar com a aprenent, als 15 anys, al taller de Francesc Juventeny, combinant aquesta formació tradicional al taller amb els estudis a l'Escola Massana de Barcelona. Allà va tenir com a mestre a Eudald Serra, membre destacat de la modernitat catalana dels anys trenta als seixanta.\n\nLa tècnica de Mañosa denota un coneixement de l'ofici tradicional, amb el fang i posteriorment amb el bronze com a material característic de la seva obra, i la seva convivència amb tècniques més modernes, sense perdre l'essència artesanal característica de l'escultor.\n\nDestaquen els nus femenins, amb una acurada tècnica que sembla que els hagi dotat de moviment. Mañosa també ha dedicat molt de la seva obra a l'escultura pública de grans dimensions, en un gran nombre de ciutats arreu de Catalunya i Espanya, així com a Brasil, Rússia, França, Japó, Alemanya, o als Estats Units.\n\nSalvador Mañosa va morir el 15 de novembre de 2022, als 77 anys. Va dedicar part del seu temps a la formació de temes concrets de la seva professió, compartint els seus coneixements i experiència en l'art de l'escultura, manifestant que «és tota una satisfacció i la millor recompensa comprovar com actualment algunes i alguns del meu alumnat està exposant arreu del món».\n\nMés informació: <a href=\"https://www.cerdanyola.cat/actualitat/salvador-manosa-lescultor-de-cerdanyola\" target=\"_blank\" rel=\"noopener\">Salvador Mañosa, l'escultor de Cerdanyola</a>"
collab_benet_title: Benet Ferrer Bolunya
collab_benet_text: "2. Benet Ferrer Bolunya (Sabadell, 25 d'abril de 1945)\n\nÉs un artista català. Es va formar a l'Escola Industrial d'Arts i Oficis de Sabadell (1962–1966) i a l'Escola Massana (1966) i ben aviat es va interessar per la ceràmica com a mitjà de treball escultòric. Vinculat de molt jove a l'avantguarda, la part més important de la seva obra, consistent en la representació exacta d'objectes quotidians, és d'orientació hiperrealista. Ha dut a terme també happenings i diverses accions col·lectives amb participació del públic. El 1969 començà a fer de professor a l'Escola Massana.\n\nEl 1976 va presentar a la Galeria G una exposició amb escultures de terracota. A l'Espai 10 de la Fundació Joan Miró el 1980 va introduir una estructura de fang sense coure que sortia de la sala, com si en travessés la paret de vidre, per estendre's cap a l'exterior pel pati de l'olivera. Segons Daniel Giralt-Miracle, aquesta exposició va suposar un moment clau en la trajectòria de l'artista.\n\nEl 1977 feu el mur de ceràmica a l'autopista de l'Ebre, a Fraga. Té una llarga experiència en el camp de la ceràmica; va experimentar des dels anys setanta amb uns metaobjectes, que amb ficció visual i tàctil jugaven amb la realitat, per passar després a treballs vinculats a l'art conceptual i a objectes de marqueteria.\n\nEl 1985 rep una beca del Departament d'Arts Plàstiques de la Generalitat de Catalunya per a la realització de peces de mobiliari. El 1987 és membre de l'Académie Internationale de la Céramique de Ginebra. El 1988 realitza l'escultura Campoamor a Sabadell.\n\nMés informació: <a href=\"https://ca.wikipedia.org/wiki/Benet_Ferrer_Bolunya\" target=\"_blank\" rel=\"noopener\">Benet Ferrer Bolunya — Viquipèdia</a>"
collab_maties_title: Maties Palau Ferré
collab_maties_text: "9 — Artistes col·laboradors del taller\n\n1. Maties Palau Ferré\n\nLa vida del pintor, escultor i ceramista Maties Palau Ferré (1921–2000) és una història d'amor per l'art distorsionada per les baixeses i les misèries de la cobdícia i la mala fe. Amb el desavantatge afegit, a més, que la notorietat indesitjada i no purament artística que va adquirir entre principis dels 70 i mitjan dels 80 n'ha perjudicat la posteritat. Almenys ha fet que no sigui tan conegut com sembla que ho hauria de ser tenint en compte els èxits que va gaudir en vida. Amb El pintor que cremava els seus quadres. Assaig biogràfic de Maties Palau Ferré, l'historiador Francesc Marco-Palau (Tarragona, 1989), un besnebot de l'artista, vol contribuir a recuperar les seves figura i obra.\n\nConegut per alguna gent com «el segon Picasso» —un elogi descomunal que a l'artista, raonablement, no li feia gaire gràcia: «jo soc el primer Palau Ferré», replicava—, Maties Palau Ferré va néixer a Montblanc el 1921 en una família de comerciants i fabricants d'espardenyes. També eren propietaris de terres i tenien unes certes inquietuds culturals. Palau Ferré va tenir clara molt aviat la vocació artística i, superada la guerra civil —li va venir de només un any no ser mobilitzat amb la lleva del biberó—, va guanyar una plaça a l'Institut de Previsió que li va permetre instal·lar-se a Barcelona. La posició laboral era només l'excusa: si havia anat a Barcelona, era per formar-se com a artista i fer-se un lloc en el món de l'art. Es va matricular a l'Escola de Belles Arts Sant Jordi i a poc a poc es va anar fent un lloc dins el circuit artístic barceloní.\n\nMés informació: <a href=\"https://es.wikipedia.org/wiki/Mat%C3%ADas_Palau_Ferr%C3%A9\" target=\"_blank\" rel=\"noopener\">Matías Palau Ferré — Viquipèdia</a>"
