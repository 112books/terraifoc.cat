hero_brand: Terra i Foc
hero_tagline: Obrador de ceràmica artesanal
hero_desc: "Fundat per Joan Martínez Peidro el 1969. Ceràmica artesanal feta a mà al Penedès, amb l'ajuda de la seva esposa Isabel Serres i artistes col·laboradors."
hero_cita: "L'artesania és la capacitat de què disposen els humans de produir objectes amb les mans o amb l'ajut d'utillatges o màquines simples. Els artesans també poden fer produccions seriades, però es diferencien de les industrials perquè les peces artesanals s'elaboren amb les mans, d'una en una, i això fa que l'objecte sigui únic."

