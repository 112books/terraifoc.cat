section_quisom_label: — 01
section_quisom_title: Qui som
section_quisom_tagline: "Ceràmica artesanal al <span>Penedès</span>. Un ofici de tota la vida."
quisom_text: "Terra i Foc és un obrador de ceràmica artesanal situat al carrer de la Verge de Montserrat, 17, al Pago (Subirats). Fundat el 1969 per Joan Martínez Peidro, l'obrador ha estat durant dècades un punt de referència de la ceràmica feta a mà al Penedès. Cada peça es treballa amb cura, de l'amassat de l'argila a la cuita final al forn. Avui, el seu fill en continua l'ofici de forma esporàdica, mantenint viu el foc de la tradició."

section_historia_label: — 02
section_historia_title: Història
section_historia_tagline: "El 1969 vam encendre el forn per primera vegada. La resta és <span>terra i foc</span>."
historia_intro: "L'any 1969, Joan Martínez Peidro va obrir l'obrador de ceràmica Terra i Foc al Pago. Durant 41 anys va dedicar-se a l'ofici de ceramista, creant peces úniques i treballant per encàrrec. Després de la seva jubilació el 2010, el seu fill ha mantingut viva l'essència de l'obrador, assumint encàrrecs puntuals i preservant el llegat d'una vida dedicada a la ceràmica."

section_protagonistes_label: — 03
section_protagonistes_title: Protagonistes
section_protagonistes_tagline: "Una vida dedicada a l'ofici. <span>La terra i el foc</span>."

