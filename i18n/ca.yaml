section_collab_label: — 04
section_collab_title: Col·laboracions
section_collab_subtitle: "Artistes, artesans i encàrrecs que han donat forma al camí."

collab_text: "Terra i Foc va col·laborar amb diversos ceramistes, escultors, pintors i artesans. També va comptar amb una xarxa de representants que van portar les peces a tot Espanya i les Illes."

collab_dedicacio_text: "Dediquem aquest llibre a tots els que han col·laborat a fer aquest recull de la feina feta al taller durant més de quaranta anys.\n\nAls fills i nets perquè puguin recordar el tros que l'han viscut.\n\nA la Dolors Albós per la correcció del text i a la Dolors Bosch per ajudar-nos que el redactat fos entenedor per les persones que no coneixen l'ofici.\n\nTambé per deixar constància de la diferència de com treballaven pares i avis l'ofici i agrair-los l'experiència aportada.\n\nEl Pago, agost del 2022"
