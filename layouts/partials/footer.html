<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <img src="/img/terraifoc-logo.svg" alt="Terra i Foc" class="footer-logo-img">
      <span class="footer-desc">{{ i18n "footer_desc" }}</span>
      <span class="footer-address">{{ i18n "footer_address" }}</span>

    </div>
    <div class="footer-right">

        <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}legal/privacitat/">{{ i18n "footer_legal_privacitat" }}</a>

      <div class="footer-powered">
        <a href="https://linuxbcn.com" target="_blank" rel="noopener noreferrer" class="footer-powered-link">Powered by <strong>LinuxBCN.com</strong></a>
