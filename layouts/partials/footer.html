<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <img src="/img/terraifoc-logo.svg" alt="Terra i Foc" class="footer-logo-img">
      <span class="footer-desc">{{ i18n "footer_desc" }}</span>
      <span class="footer-address">{{ i18n "footer_address" }}</span>
      <span class="footer-copy">© Terra i Foc 2026</span>
    </div>
    <div class="footer-right">
      <div class="footer-email">
        <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
      </div>
    </div>
  </div>
</footer>
