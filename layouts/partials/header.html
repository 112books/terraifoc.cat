<header class="site-header">
  <div class="header-inner">
    <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}" class="nav-brand">
      <img src="/img/terraifoc-logo.svg" alt="Terra i Foc" class="nav-logo">
    </a>
    <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}" class="nav-brand-scrolled">
      <img src="/img/terraifoc-logo.svg" alt="Terra i Foc" class="nav-scrolled-logo">
    </a>
    <nav class="nav-links" id="navLinks" aria-label="{{ i18n "nav_aria_label" }}">
      <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}#joan" class="nav-icon-link" aria-label="{{ i18n "nav_joan" }}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 20c0-4 3.5-7 7-7s7 3 7 7"/></svg>
        <span class="nav-icon-label">{{ i18n "nav_joan" }}</span>
      </a>
      <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}#familia" class="nav-icon-link" aria-label="{{ i18n "nav_familia" }}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><path d="M2 20c0-3.5 2.5-6 6-6h2c3.5 0 6 2.5 6 6"/><path d="M14 14h2c3.5 0 6 2.5 6 6"/></svg>
        <span class="nav-icon-label">{{ i18n "nav_familia" }}</span>
      </a>
      <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}#taller" class="nav-icon-link" aria-label="{{ i18n "nav_taller" }}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 21v-6h6v6"/></svg>
        <span class="nav-icon-label">{{ i18n "nav_taller" }}</span>
      </a>
      <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}#collaboracions" class="nav-icon-link" aria-label="{{ i18n "nav_collaboracions" }}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span class="nav-icon-label">{{ i18n "nav_collaboracions" }}</span>
      </a>
      <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}glossari/" class="nav-icon-link" aria-label="{{ i18n "nav_glossari" }}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span class="nav-icon-label">{{ i18n "nav_glossari" }}</span>
      </a>
      <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}credits/" class="nav-icon-link" aria-label="{{ i18n "nav_credits" }}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
        <span class="nav-icon-label">{{ i18n "nav_credits" }}</span>
      </a>
      <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}#galeria" class="nav-icon-link" aria-label="{{ i18n "nav_galeria" }}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span class="nav-icon-label">{{ i18n "nav_galeria" }}</span>
      </a>
      <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}#contacte" class="nav-icon-link" aria-label="{{ i18n "nav_contacte" }}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
        <span class="nav-icon-label">{{ i18n "nav_contacte" }}</span>
      </a>
    </nav>
    <div class="header-lang">
      {{ if eq .Language.Lang "ca" }}
        <a href="/en/" class="lang-link">EN</a>
      {{ else }}
        <a href="/" class="lang-link">CA</a>
      {{ end }}
    </div>
  </div>
</header>
