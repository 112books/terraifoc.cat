<header class="site-header">
  <div class="header-inner">
    <div class="header-row header-row--top">
      <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}" class="nav-brand nav-logo">Terra i Foc</a>
      <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}" class="nav-brand-scrolled">
        <span class="nav-scrolled-mark">TiF</span>
      </a>
    </div>
    <div class="header-row header-row--nav">
      <nav class="nav-links" aria-label="{{ if eq .Language.Lang "ca" }}Navegació principal{{ else }}Main navigation{{ end }}">
        <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}#quisom">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" role="img" aria-label="{{ i18n "nav_quisom" }}"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>{{ i18n "nav_quisom" }}</span>
        </a>
        <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}#historia">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" role="img" aria-label="{{ i18n "nav_historia" }}"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>{{ i18n "nav_historia" }}</span>
        </a>
        <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}#protagonistes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" role="img" aria-label="{{ i18n "nav_protagonistes" }}"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>{{ i18n "nav_protagonistes" }}</span>
        </a>
        <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}#fotografies">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" role="img" aria-label="{{ i18n "nav_fotografies" }}"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <span>{{ i18n "nav_fotografies" }}</span>
        </a>
        <a href="/{{ if eq .Language.Lang "en" }}en/{{ end }}#contacte">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" role="img" aria-label="{{ i18n "nav_contacte" }}"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span>{{ i18n "nav_contacte" }}</span>
        </a>
      </nav>
      <div class="header-lang">
        {{ if eq .Language.Lang "ca" }}
          <a href="/en/" class="lang-link">{{ i18n "nav_lang" }}</a>
        {{ else }}
          <a href="/" class="lang-link">{{ i18n "nav_lang" }}</a>
        {{ end }}
      </div>
    </div>
  </div>
</header>
