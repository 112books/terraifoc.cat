<div class="rprog-bar" id="rprogBar"></div>
<button class="rprog-top" id="rprogTop" type="button" aria-label="{{ i18n "scroll_top" }}">↑</button>

<style>
.rprog-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: var(--foc);
  z-index: 9999;
  width: 0%;
  transition: width 0.05s linear;
}
.rprog-top {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border-strong);
  background: var(--bg-card);
  color: var(--text-dim);
  font-size: 1.2rem;
  line-height: 1;
  cursor: pointer;
  z-index: 9997;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.3s, transform 0.3s, background 0.3s;
  pointer-events: none;
  padding: 0;
}
.rprog-top.is-visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
.rprog-top:hover { background: var(--terra); color: #fff; border-color: var(--terra); }
@media (max-width: 768px) {
  .rprog-top { right: 16px; bottom: 20px; width: 32px; height: 32px; font-size: 1rem; }
}
</style>

<script>
(function() {
  var bar = document.getElementById('rprogBar');
  var btn = document.getElementById('rprogTop');
  if (!bar || !btn) return;
  function update() {
    var docHeight = document.documentElement.scrollHeight - window.innerHeight;
    var progress = docHeight > 0 ? Math.min(window.scrollY / docHeight * 100, 100) : 0;
    bar.style.width = progress + '%';
    btn.classList.toggle('is-visible', window.scrollY > 300);
  }
  update();
  window.addEventListener('scroll', update, { passive: true });
  btn.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
})();
</script>
