<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' fonts.googleapis.com 'unsafe-inline'; font-src fonts.gstatic.com; script-src 'self' 'unsafe-inline' gc.zgo.at; img-src 'self' data:; connect-src 'self' https://terraifoc-cat.goatcounter.com; frame-src https://www.youtube.com; base-uri 'self'">
  <title>{{ if .IsHome }}{{ i18n "hero_brand" }} · {{ i18n "hero_tagline" }}{{ else }}{{ .Title }} · {{ i18n "hero_brand" }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ i18n "hero_tagline" }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="alternate" hreflang="{{ .Language.Lang }}" href="{{ .Permalink }}">
  {{ range .Translations }}
  <link rel="alternate" hreflang="{{ .Language.Lang }}" href="{{ .Permalink }}">
  {{ end }}
  <link rel="alternate" hreflang="x-default" href="{{ .Site.BaseURL }}">
  <meta property="og:title" content="{{ if .IsHome }}{{ i18n "hero_brand" }}{{ else }}{{ .Title }}{{ end }}">
  <meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ i18n "hero_tagline" }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="{{ if eq .Language.Lang "ca" }}ca_ES{{ else }}en_GB{{ end }}">
  <meta property="og:site_name" content="{{ i18n "hero_brand" }}">
  <meta property="og:image" content="{{ .Site.BaseURL }}img/terraifoc-mark.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if .IsHome }}{{ i18n "hero_brand" }}{{ else }}{{ .Title }}{{ end }}">
  <meta name="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ i18n "hero_tagline" }}{{ end }}">
  <meta name="twitter:image" content="{{ .Site.BaseURL }}img/terraifoc-mark.svg">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "Terra i Foc",
    "description": "{{ i18n "hero_desc" }}",
    "image": "{{ .Site.BaseURL }}img/terraifoc-mark.svg",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "C. Verge de Montserrat, 17",
      "addressLocality": "El Pago, Subirats",
      "addressRegion": "Barcelona",
      "addressCountry": "ES"
    },
    "email": "{{ .Site.Params.email }}",
    "url": "{{ .Site.BaseURL }}",
    "telephone": "",
    "foundingDate": "1969",
    "foundingLocation": "Barcelona",
    "knowsLanguage": ["ca", "en"],
    "sameAs": [
      "{{ .Site.Params.instagram }}"
    ]
  }
  </script>
  {{ if not .IsHome }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "{{ i18n "hero_brand" }}",
        "item": "{{ .Site.BaseURL }}"
      },
      {
        "@type": "ListItem",
        "position": 2,
        "name": "{{ .Title }}",
        "item": "{{ .Permalink }}"
      }
    ]
  }
  </script>
  {{ end }}
  <meta name="theme-color" content="#361712">
  <link rel="icon" href="/img/terraifoc-mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/img/terraifoc-mark.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Jost:wght@300;350;400;500;600&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@300;350;400;500;600&display=swap">
  </noscript>
  {{ $css := resources.Get "css/main.css" | resources.Minify }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">
  <script data-goatcounter="https://terraifoc-cat.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">{{ i18n "skip_link" }}</a>
  {{ partial "header.html" . }}
  <main id="main-content" tabindex="-1">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ partial "progress.html" . }}

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="{{ if eq .Language.Lang "ca" }}Visualització ampliada{{ else }}Image preview{{ end }}">
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="{{ if eq .Language.Lang "ca" }}Tancar{{ else }}Close{{ end }}">×</button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
  (function(){
    var revealObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('section--visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    var sections = document.querySelectorAll('.section-reveal');
    sections.forEach(function(s) { revealObserver.observe(s); });

    var header = document.querySelector('.site-header');
    if (header) {
      function onScroll() {
        header.classList.toggle('header-scrolled', window.scrollY > 80);
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    }

    var galleryImages = document.querySelectorAll('.gallery-item img');
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightboxImg');
    var lightboxClose = document.getElementById('lightboxClose');
    if (galleryImages.length && lightbox && lightboxImg && lightboxClose) {
      function trapFocus(e) {
        if (!lightbox.classList.contains('lightbox--open')) return;
        var focusable = lightbox.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
        if (!focusable.length) return;
        var first = focusable[0];
        var last = focusable[focusable.length - 1];
        if (e.key === 'Tab') {
          if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
          else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      }
      galleryImages.forEach(function(img) {
        img.addEventListener('click', function() {
          lightboxImg.src = this.src;
          lightboxImg.alt = this.alt;
          lightbox.classList.add('lightbox--open');
          document.body.style.overflow = 'hidden';
          setTimeout(function(){ lightboxClose.focus(); }, 100);
        });
      });
      function closeLightbox() {
        lightbox.classList.remove('lightbox--open');
        document.body.style.overflow = '';
      }
      lightboxClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeLightbox();
        trapFocus(e);
      });
    }
  })();
  </script>
</body>
</html>
