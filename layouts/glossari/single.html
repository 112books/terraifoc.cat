{{ define "main" }}

<section class="section" style="padding-top: 120px; padding-bottom: 80px;">
  <div class="section-inner" style="max-width: 720px;">
    <h1 class="section-title section-title--large" style="margin-bottom: 32px;">{{ .Title }}</h1>
    <div class="glossary">
      {{ $entries := index hugo.Data.glossary .Language.Lang "entries" }}
      {{ range $entries }}
      <div class="glossary-item">
        <dt class="glossary-term">{{ .term }}</dt>
        <dd class="glossary-def">{{ .def }}</dd>
      </div>
      {{ end }}
    </div>
  </div>
</section>

{{ end }}
